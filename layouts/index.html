{{ define "main" }}
  <h2>最新文章</h2>
  {{ $posts := where site.RegularPages "Section" "posts" }}
  {{ if $posts }}
    <ul class="post-list">
      {{ range $posts }}
        <li>
          <div class="post-title"><a href="{{ .RelPermalink }}">{{ .Title }}</a></div>
          <div class="post-meta">{{ .Date.Format "2006-01-02" }}</div>
          {{ with .Summary }}<p>{{ . }}</p>{{ end }}
        </li>
      {{ end }}
    </ul>
  {{ else }}
    <p>还没有文章。</p>
  {{ end }}
{{ end }}
