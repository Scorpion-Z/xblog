baseURL = 'https://scorpion-z.github.io/xblog/'
languageCode = 'zh-CN'
defaultContentLanguage = 'zh-cn'
locale = 'zh-CN'
title = '飞行笔记'
theme = 'PaperMod'

[params]
description = '把技术实践、阅读笔记与日常观察整理成可再次起飞的文字'
defaultTheme = 'auto'
disableThemeToggle = false
ShowReadingTime = true
ShowShareButtons = false
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowWordCount = false
ShowRssButtonInSectionTermList = true
UseHugoToc = true
showtoc = true
tocopen = true
DateFormat = '2006-01-02'

[params.homeInfoParams]
Title = '飞行笔记'
Content = '把技术实践、阅读笔记与日常观察整理成可再次起飞的文字。'

[params.assets]
disableHLJS = true
favicon = 'favicon.svg'
theme_color = '#0078d4'
msapplication_TileColor = '#0078d4'

[params.label]
text = '飞行笔记'
icon = 'brand/flight-notes-logo.svg'
iconHeight = 30

[params.fuseOpts]
isCaseSensitive = false
shouldSort = true
location = 0
distance = 1000
threshold = 0.4
minMatchCharLength = 1
keys = ['title', 'permalink', 'summary', 'content', 'tags', 'categories']

[outputs]
home = ['HTML', 'RSS', 'JSON']

[taxonomies]
category = 'categories'
tag = 'tags'

[markup]
  [markup.highlight]
  noClasses = false
  lineNos = false
  codeFences = true
  guessSyntax = true

[[menu.main]]
identifier = 'home'
name = '首页'
url = '/'
weight = 10

[[menu.main]]
identifier = 'posts'
name = '文章'
url = '/posts/'
weight = 20

[[menu.main]]
identifier = 'archives'
name = '归档'
url = '/archives/'
weight = 30

[[menu.main]]
identifier = 'categories'
name = '分类'
url = '/categories/'
weight = 40

[[menu.main]]
identifier = 'tags'
name = '标签'
url = '/tags/'
weight = 50

[[menu.main]]
identifier = 'search'
name = '搜索'
url = '/search/'
weight = 60

[[menu.main]]
identifier = 'about'
name = '关于'
url = '/about/'
weight = 70
